# CI + GitHub Pages deploy — 05 §4 kapıları: type-check + test + içerik doğrulama + build
name: ci-deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run migrate          # içerik üretimi + mutabakat raporu
      - run: npx tsc --noEmit         # type-check kapısı
      - run: npx vitest run --coverage  # test + içerik doğrulama + coverage eşiği (80/75)
      - run: npm run build            # production build
        env:
          VITE_BASE: "/${{ github.event.repository.name }}/"  # Pages alt yolu
      - name: SPA fallback (404.html)
        run: cp build/index.html build/404.html
      # E2e + axe — build edilmiş ürün üzerinde, kök base ile (05 §2.5)
      - name: E2e için kök-base build
        run: npx vite build && node tools/syncBuild.mjs
        env:
          VITE_OUT: /tmp/e2e-build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - run: npx size-limit          # bundle bütçesi kapısı (14 #15) — kök-base build üzerinde
      # Pages artifact'i alt-yol base'li ilk build'den
      - name: Pages build (alt yol)
        run: npx vite build && cp -r /tmp/pages-build/. build/ && cp build/index.html build/404.html
        env:
          VITE_BASE: "/${{ github.event.repository.name }}/"
          VITE_OUT: /tmp/pages-build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
