<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Bitemporal kayıt — iki bağımsız zaman ekseni">
<title>Bitemporal kayıt — iki bağımsız zaman ekseni</title>
<rect width="800" height="450" rx="12" fill="#1a1d21" stroke="#2e333a"/>
<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#939ba7"/></marker></defs>
<text x="120" y="150" font-family="Roboto, system-ui, sans-serif" font-size="14" font-weight="400" fill="#7fb3e3" text-anchor="start">valid_time</text>
<line x1="120" y1="170" x2="700" y2="170" stroke="#7fb3e3" stroke-width="2"/>
<circle cx="200" cy="170" r="6" fill="#7fb3e3"/><circle cx="380" cy="170" r="6" fill="#7fb3e3"/><circle cx="560" cy="170" r="6" fill="#7fb3e3"/>
<text x="120" y="280" font-family="Roboto, system-ui, sans-serif" font-size="14" font-weight="400" fill="#e0b45c" text-anchor="start">system_time</text>
<line x1="120" y1="300" x2="700" y2="300" stroke="#e0b45c" stroke-width="2"/>
<circle cx="260" cy="300" r="6" fill="#e0b45c"/><circle cx="440" cy="300" r="6" fill="#e0b45c"/><circle cx="620" cy="300" r="6" fill="#e0b45c"/>
<text x="400" y="380" font-family="Roboto, system-ui, sans-serif" font-size="14" font-weight="400" fill="#939ba7" text-anchor="middle">Geçmiş asla silinmez — düzeltme yeni satırdır</text></svg>
